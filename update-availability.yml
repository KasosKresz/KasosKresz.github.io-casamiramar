name: Update Availability Data

on:
  workflow_dispatch:
  schedule:
    - cron: '15 */6 * * *'

permissions:
  contents: write

concurrency:
  group: availability-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build availability data
        run: node scripts/build-availability-data.mjs
        env:
          AIRBNB_ICAL_URL: ${{ secrets.AIRBNB_ICAL_URL }}
          BOOKING_ICAL_URL: ${{ secrets.BOOKING_ICAL_URL }}

      - name: Commit updated availability data
        run: |
          if git diff --quiet -- availability-data.json; then
            echo "No availability changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add availability-data.json
          git commit -m "Update availability data"
          git push
